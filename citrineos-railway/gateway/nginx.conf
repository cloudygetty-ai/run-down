# CitrineOS Gateway — Nginx Reverse Proxy
#
# This file is a template. ${VAR} placeholders are replaced by envsubst
# at container start (see Dockerfile CMD). Nginx variables ($uri, $host, etc.)
# are NOT touched because Dockerfile only substitutes the four named vars.
#
# Route map:
#   GET /health                → gateway health (local, no upstream)
#   /api/graphql               → Hasura GraphQL HTTP  (port 8080)
#   /api/graphql/ws            → Hasura GraphQL WebSocket
#   /cms/                      → Directus CMS         (port 8055)
#   /ocpp/                     → CitrineOS Core HTTP  (port 8080)
#   /ocpp-ws                   → CitrineOS Core WebSocket (port 8081)
#   /api/extensions/           → Extensions Service   (port 3001)

worker_processes auto;
error_log stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - "$request" $status $body_bytes_sent "$http_user_agent"';
    access_log /dev/stdout main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 16m;

    # Railway / Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name _;

        # ── Gateway health check ─────────────────────────────────────────────
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"citrineos-gateway"}';
        }

        # ── Hasura GraphQL HTTP ──────────────────────────────────────────────
        location = /api/graphql {
            set $hasura_upstream http://${HASURA_HOST}:8080;
            proxy_pass         $hasura_upstream/v1/graphql;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Hasura GraphQL WebSocket (subscriptions) ─────────────────────────
        location = /api/graphql/ws {
            set $hasura_upstream http://${HASURA_HOST}:8080;
            proxy_pass         $hasura_upstream/v1/graphql;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Directus CMS ─────────────────────────────────────────────────────
        location /cms/ {
            set $directus_upstream http://${DIRECTUS_HOST}:8055;
            rewrite            ^/cms(/.*)$ $1 break;
            proxy_pass         $directus_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── CitrineOS Core HTTP API ───────────────────────────────────────────
        location /ocpp/ {
            set $citrineos_upstream http://${CITRINEOS_CORE_HOST}:8080;
            proxy_pass         $citrineos_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── CitrineOS Core WebSocket (OCPP 2.0.1) ────────────────────────────
        # Charge point URL: wss://YOUR_GATEWAY/ocpp-ws/STATION_ID
        location /ocpp-ws {
            set $citrineos_ws_upstream http://${CITRINEOS_CORE_HOST}:8081;
            proxy_pass         $citrineos_ws_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # ── Extensions Service ────────────────────────────────────────────────
        location /api/extensions/ {
            set $extensions_upstream http://${EXTENSIONS_HOST}:3001;
            proxy_pass         $extensions_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── 404 fallthrough ───────────────────────────────────────────────────
        location / {
            add_header Content-Type application/json;
            return 404 '{"error":"not_found"}';
        }
    }
}
