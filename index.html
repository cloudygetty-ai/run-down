<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Run Down — Live Sports Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#08090d;color:#f5f0e8;font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
  .bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,#1a0a00 0%,#08090d 60%);z-index:0}
  .container{position:relative;z-index:1;text-align:center;padding:2rem}
  .logo{font-family:'Cinzel',serif;font-size:clamp(3rem,8vw,6rem);font-weight:900;letter-spacing:0.05em;background:linear-gradient(135deg,#d4a847 0%,#f5d98a 50%,#b8860b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.5rem}
  .tagline{font-size:clamp(0.8rem,2vw,1rem);letter-spacing:0.3em;text-transform:uppercase;color:#9a8a6a;margin-bottom:3rem}
  .badge{display:inline-block;background:rgba(212,168,71,0.1);border:1px solid rgba(212,168,71,0.3);color:#d4a847;font-size:0.75rem;letter-spacing:0.2em;padding:0.5rem 1.5rem;border-radius:2px;text-transform:uppercase;margin-bottom:2rem}
  .desc{max-width:500px;margin:0 auto 3rem;color:#7a7060;font-size:0.9rem;line-height:1.8}
  .cta{display:inline-block;background:linear-gradient(135deg,#d4a847,#b8860b);color:#08090d;font-family:'Cinzel',serif;font-weight:700;font-size:0.85rem;letter-spacing:0.15em;text-transform:uppercase;padding:1rem 2.5rem;text-decoration:none;border-radius:2px}
  .divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,#d4a847,transparent);margin:3rem auto}
  .stats{display:flex;gap:3rem;justify-content:center;color:#9a8a6a;font-size:0.75rem;letter-spacing:0.15em}
  .stat span{display:block;font-family:'Cinzel',serif;font-size:1.5rem;color:#d4a847;margin-bottom:0.25rem}
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
  <div class="badge">Coming Soon</div>
  <div class="logo">RUN DOWN</div>
  <div class="tagline">Live Sports Intelligence Platform</div>
  <p class="desc">Real-time scores, predictive analytics, and AI-powered game insights. Built for the serious fan.</p>
  <a href="mailto:cloudygetty@gmail.com" class="cta">Get Early Access</a>
  <div class="divider"></div>
  <div class="stats">
    <div><span>8+</span>Sports</div>
    <div><span>Live</span>Scores</div>
    <div><span>AI</span>Predictions</div>
  </div>
</div>
</body>
</html>
