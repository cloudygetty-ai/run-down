<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLLOW</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  color:#c8c8c8;
  font-family:'Courier New',monospace;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

#game-wrap {
  width:100%;
  max-width:780px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:20px;
  position:relative;
}

#title-screen {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  cursor:pointer;
}

.title-text {
  font-size:clamp(48px,10vw,96px);
  letter-spacing:0.3em;
  color:#fff;
  text-shadow:0 0 60px rgba(255,255,255,0.15);
  animation:titlePulse 4s ease-in-out infinite;
}

.title-sub {
  font-size:13px;
  color:#333;
  letter-spacing:0.25em;
  margin-top:16px;
  opacity:0;
  animation:fadeIn 2s ease forwards;
  animation-delay:1.5s;
}

.title-start {
  font-size:11px;
  color:#222;
  letter-spacing:0.3em;
  margin-top:60px;
  opacity:0;
  animation:blinkIn 1s step-end infinite;
  animation-delay:3.5s;
}

@keyframes titlePulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
@keyframes fadeIn { to{opacity:1} }
@keyframes blinkIn { 0%,100%{opacity:0} 50%{opacity:1} }

#scene-art {
  font-size:10px;
  line-height:1.25;
  color:#222;
  white-space:pre;
  text-align:center;
  margin:12px 0;
  min-height:110px;
  transition:color 1.5s;
  font-family:monospace;
  overflow:hidden;
}

#clock {
  text-align:right;
  font-size:11px;
  color:#1e1e1e;
  letter-spacing:0.15em;
  margin-bottom:6px;
  transition:color 2s;
}

#room-title {
  font-size:16px;
  letter-spacing:0.25em;
  color:#666;
  border-bottom:1px solid #111;
  padding-bottom:6px;
  margin-bottom:12px;
  text-transform:uppercase;
  transition:color 1s;
}

#output {
  flex:1;
  min-height:200px;
  max-height:300px;
  overflow-y:auto;
  margin-bottom:14px;
  padding-right:6px;
  scrollbar-width:thin;
  scrollbar-color:#111 #000;
}

#output::-webkit-scrollbar { width:3px; }
#output::-webkit-scrollbar-track { background:#000; }
#output::-webkit-scrollbar-thumb { background:#111; }

.msg {
  font-size:13px;
  line-height:1.75;
  margin-bottom:10px;
  opacity:0;
  animation:msgIn 0.6s forwards;
}
.msg.horror { color:#6b0000; }
.msg.system { color:#1e1e1e; font-size:11px; }
.msg.whisper { color:#171717; font-style:italic; font-size:11px; }
.msg.revelation { color:#900; font-size:14px; letter-spacing:0.04em; }

@keyframes msgIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }

#actions {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:14px;
}

.action-btn {
  background:none;
  border:1px solid #181818;
  color:#444;
  font-family:'Courier New',monospace;
  font-size:12px;
  padding:5px 11px;
  cursor:pointer;
  letter-spacing:0.1em;
  transition:all 0.2s;
  text-transform:lowercase;
}
.action-btn:hover { border-color:#444; color:#999; background:#080808; }

#exits {

  padding-top:10px;

.exit-label {
  font-size:9px;
  color:#1a1a1a;
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:5px;
}

#exit-btns { display:flex; flex-wrap:wrap; gap:6px; }

.exit-btn {
  background:none;
  border:none;
  color:#2a2a2a;
  font-family:'Courier New',monospace;
  font-size:12px;
  cursor:pointer;
  padding:3px 0;
  letter-spacing:0.1em;
  transition:color 0.2s;
  text-decoration:underline;
  text-decoration-color:#141414;
}

#glitch-overlay {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:50;
  opacity:0;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 2px,

  );
}
.glitch-active {
  animation:glitchFlash 0.12s steps(1) forwards;
}
@keyframes glitchFlash {
  0%   { opacity:1; transform:translate(-3px,0); filter:hue-rotate(90deg) brightness(1.5); }
  25%  { transform:translate(3px,-1px); filter:hue-rotate(-90deg); }
  50%  { transform:translate(-1px,2px); filter:brightness(0.5); }
  75%  { transform:translate(2px,-2px); filter:hue-rotate(180deg); }

#sanity-bar {
  position:fixed;
  top:0; left:0;
  height:2px;
  background:#5a0000;
  transition:width 2s ease,background 2s;
  z-index:60;

body::after {
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.75) 100%);

  z-index:2;

#inventory {

  margin-bottom:10px;
  letter-spacing:0.1em;
  min-height:16px;

.inv-item {

.inv-item:hover { border-color:#333; color:#555; }

#loop-count {

  font-size:9px;
  color:#0e0e0e;
  letter-spacing:0.15em;
}

#fade-overlay {

  inset:0;
  background:#000;
  z-index:90;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.8s;

#end-screen {

  inset:0;

  justify-content:center;

#restart-btn {

  opacity:0;
  animation:fadeIn 1s ease forwards;
  animation-delay:4s;

<script>
// ─── AUDIO ENGINE ────────────────────────────────────────────────
const Audio = (() => {
  let ctx, masterGain, droneGain, droneOsc, droneOsc2;
  let heartbeatInterval = null;

  function init() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.35;
    masterGain.connect(ctx.destination);
    startDrone();
  }

  function startDrone() {
    droneGain = ctx.createGain();
    droneGain.gain.value = 0;
    droneGain.connect(masterGain);

    droneOsc = ctx.createOscillator();
    droneOsc.type = 'sine';
    droneOsc.frequency.value = 55;
    droneOsc.connect(droneGain);

    droneOsc2 = ctx.createOscillator();
    droneOsc2.type = 'sine';
    droneOsc2.frequency.value = 55.5;
    droneOsc2.connect(droneGain);

    droneOsc.start();
    droneOsc2.start();
    droneGain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 5);
  }

  function setDroneIntensity(level) {
    if (!ctx) return;
    droneGain.gain.linearRampToValueAtTime(Math.min(0.4, level * 0.35), ctx.currentTime + 2);
    droneOsc2.frequency.linearRampToValueAtTime(55 + level * 2.5, ctx.currentTime + 2);
  }

  function playStatic(dur = 0.3) {
    if (!ctx) return;
    const len = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * 0.25;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.value = 0.18;
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 1000 + Math.random() * 1500;
    src.connect(filt);
    filt.connect(gain);
    gain.connect(masterGain);
    src.start();
    src.stop(ctx.currentTime + dur);
  }

  function playBeat() {
    if (!ctx) return;
    const t = ctx.currentTime;
    const beat = (offset) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = 75;
      g.gain.setValueAtTime(0, t + offset);
      g.gain.linearRampToValueAtTime(0.5, t + offset + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.25);
      o.connect(g); g.connect(masterGain);
      o.start(t + offset);
      o.stop(t + offset + 0.3);
    };
    beat(0); beat(0.22);
  }

  function startHeartbeat(bpm = 60) {
    stopHeartbeat();
    heartbeatInterval = setInterval(playBeat, 60000 / bpm);
  }

  function stopHeartbeat() {
    if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
  }

  function playCreak() {
    if (!ctx) return;
    const dur = 0.7 + Math.random() * 0.5;
    const o = ctx.createOscillator();
    o.type = 'sawtooth';
    const g = ctx.createGain();
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.value = 350;
    o.frequency.setValueAtTime(180 + Math.random() * 80, ctx.currentTime);
    o.frequency.linearRampToValueAtTime(120, ctx.currentTime + dur);
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.08);
    g.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
    o.connect(f); f.connect(g); g.connect(masterGain);
    o.start(); o.stop(ctx.currentTime + dur + 0.1);
  }

  function playChime(freq = 440, vol = 0.25) {
    if (!ctx) return;
    const o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3.5);
    o.connect(g); g.connect(masterGain);
    o.start(); o.stop(ctx.currentTime + 3.6);
  }

  function playMusicBox() {
    if (!ctx) return;
    const melody = [523,659,784,659,784,880,784,659,523,392,440,523,392,330,392,523];
    melody.forEach((f, i) => setTimeout(() => playChime(f * 0.5, 0.3), i * 380));
  }

  function playWhisper() {
    if (!ctx) return;
    [0, 70, 160].forEach(d => setTimeout(() => playStatic(0.06 + Math.random() * 0.04), d));
  }

  function fadeOut(dur = 3) {
    if (!ctx) return;
    masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
  }

  return { init, setDroneIntensity, playStatic, startHeartbeat, stopHeartbeat, playCreak, playChime, playMusicBox, playWhisper, fadeOut };
})();


// ─── GLITCH ENGINE ───────────────────────────────────────────────
const Glitch = {
  el: null,
  _timer: null,
  init() { this.el = document.getElementById('glitch-overlay'); },
  trigger(intensity = 1) {
    this.el.classList.remove('glitch-active');
    void this.el.offsetWidth;
    this.el.classList.add('glitch-active');
    if (intensity >= 2) {
      document.body.style.transform = `translate(${(Math.random()-0.5)*5}px,${(Math.random()-0.5)*3}px)`;
      setTimeout(() => document.body.style.transform = '', 110);
    }
    Audio.playStatic(0.08);
  },
  startRandom(sanity) {
    if (this._timer) clearInterval(this._timer);
    if (sanity <= 0) return;
    const base = Math.max(4000, 25000 * sanity);
    this._timer = setInterval(() => {
      if (Math.random() < 0.35) this.trigger(sanity < 0.45 ? 2 : 1);
    }, base);
  }
};

// ─── UI ──────────────────────────────────────────────────────────
const UI = {
  init() {
    this.output = document.getElementById('output');
    this.roomTitle = document.getElementById('room-title');
    this.sceneArt = document.getElementById('scene-art');
    this.actionsEl = document.getElementById('actions');
    this.exitBtns = document.getElementById('exit-btns');
    this.clockEl = document.getElementById('clock');
    this.inventoryEl = document.getElementById('inventory');
    this.sanityBar = document.getElementById('sanity-bar');
    this.loopCount = document.getElementById('loop-count');
    this.fade = document.getElementById('fade-overlay');
    this.endScreen = document.getElementById('end-screen');
  },

  print(text, cls = '') {
    const el = document.createElement('div');
    el.className = `msg${cls ? ' ' + cls : ''}`;
    el.innerHTML = text.replace(/\n/g, '<br>').replace(/\*(.*?)\*/g, '<em>$1</em>');
    this.output.appendChild(el);
    this.output.scrollTop = this.output.scrollHeight;
  },

  clear() { this.output.innerHTML = ''; },

  setRoom(title, art) {
    this.roomTitle.textContent = title;
    this.sceneArt.textContent = art;
  },

  setClock(h, m, sanity) {
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
    this.clockEl.textContent = `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ampm}`;
    const r = Math.round(180 * (1 - sanity));
    this.clockEl.style.color = `rgb(${r},${Math.round(r*0.15)},${Math.round(r*0.15)})`;
  },

  setActions(btns) {
    this.actionsEl.innerHTML = '';
    btns.forEach(b => {
      const el = document.createElement('button');
      el.className = 'action-btn';
      el.textContent = b.label;
      el.onclick = b.fn;
      this.actionsEl.appendChild(el);
    });
  },

  setExits(exits) {
    this.exitBtns.innerHTML = '';
    exits.forEach(e => {
      const el = document.createElement('button');
      el.className = 'exit-btn';
      el.textContent = e.label;
      el.onclick = e.fn;
      this.exitBtns.appendChild(el);
    });
  },

  updateInventory(items) {
    if (!items.length) { this.inventoryEl.textContent = ''; return; }
    this.inventoryEl.innerHTML = items.map(i =>
      `<span class="inv-item">${i}</span>`
    ).join('');
    Array.from(this.inventoryEl.querySelectorAll('.inv-item')).forEach((el, i) => {
      el.onclick = () => Game.examineItem(items[i]);
    });
  },

  updateSanity(s) {
    this.sanityBar.style.width = `${Math.round(s * 100)}%`;
    this.sanityBar.style.background = `hsl(0,75%,${10 + s * 20}%)`;
    this.sceneArt.style.color = `rgba(200,200,200,${0.12 + s * 0.18})`;
  },

  updateLoop(n) {
    this.loopCount.textContent = n > 0 ? `night ${n + 1}` : '';
  },

  fadeIn(cb, dur = 800) {
    this.fade.classList.add('fading');
    setTimeout(() => { if (cb) cb(); this.fade.classList.remove('fading'); }, dur);
  },

  fadeOut(cb, dur = 700) {
    this.fade.classList.remove('fading');
    void this.fade.offsetWidth;
    this.fade.classList.add('fading');
    setTimeout(() => { if (cb) cb(); }, dur);
  },

  showEnding(title, text) {
    this.endScreen.style.display = 'flex';
    document.getElementById('end-title').textContent = title;
    document.getElementById('end-text').innerHTML = text.replace(/\n/g, '<br>');
    Audio.fadeOut(4);
  },
};


// ─── GAME ────────────────────────────────────────────────────────
const Game = {
  init() {
    Audio.init();
    Glitch.init();
    UI.init();
    this.enterRoom('driveway');
    this.startClock();
    Glitch.startRandom(1.0);
  },

  enterRoom(id) {
    const room = ROOMS[id];
    if (!room) return;
    S.room = id;
    const firstVisit = !S.seenRooms.has(id);
    S.seenRooms.add(id);

    UI.clear();
    UI.setRoom(room.title, room.art);

    const horrorLevel = { basement:0.8, attic:1.0, your_room:0.65, upstairs:0.45 };
    const level = (horrorLevel[id] || 0.15) * (0.5 + (1 - S.sanity) * 0.5);
    Audio.setDroneIntensity(level);

    if (id === 'attic' || id === 'basement') {
      Audio.startHeartbeat(75 + (1 - S.sanity) * 45);
    } else {
      Audio.stopHeartbeat();
    }

    if (['upstairs','your_room','master_room','foyer'].includes(id)) {
      setTimeout(() => Audio.playCreak(), 600);
    }

    const descIdx = Math.min(S.loop, room.desc.length - 1);
    const desc = room.desc[descIdx];
    if (desc) setTimeout(() => UI.print(desc), 150);

    if (firstVisit && id === 'basement') this.shiftSanity(-0.1);
    if (id === 'attic' && S.loop >= 2) this.shiftSanity(-0.15);

    this.renderActions(room);
    this.renderExits(room);

    if (horrorLevel[id] && Math.random() < 0.4) {
      setTimeout(() => Glitch.trigger(S.sanity < 0.5 ? 2 : 1), 1800 + Math.random() * 2500);
    }

    if (S.loop >= 2 && Math.random() < 0.25) {
      setTimeout(() => {
        Audio.playWhisper();
        if (Math.random() < 0.4) UI.print('*Something breathes.*', 'whisper');
      }, 4000 + Math.random() * 6000);
    }

    UI.updateSanity(S.sanity);
    UI.setClock(S.clockH, S.clockM, S.sanity);
  },

  renderActions(room) {
    const btns = (room.actions || [])
      .filter(a => !a.condition || a.condition(S))
      .map(a => ({ label: a.label, fn: () => this.doAction(room, a) }));
    UI.setActions(btns);
  },

  renderExits(room) {
    const exits = (room.exits || []).filter(e => !e.condition || e.condition(S));
    UI.setExits(exits.map(e => ({
      label: e.label,
      fn: () => {
        Audio.playCreak();
        UI.fadeOut(() => this.enterRoom(e.to), 400);
      }
    })));
  },

  doAction(room, action) {
    const idx = Math.min(S.loop, (action.desc || []).length - 1);
    const desc = action.desc[idx];

    if (action.give) {
      const g = action.give;
      if (g.check(S) && desc) {
        S.inventory.push(g.item);
        UI.updateInventory(S.inventory);
        UI.print(desc);
        Audio.playChime(330);
        this.renderExits(room);
        this.renderActions(room);
        return;
      }
    }

    if (!desc) { UI.print('*You already know what is there.*', 'whisper'); return; }

    UI.print(desc);

    if (action.key === 'trunk' && !S.flags.trunkOpened) {
      S.flags.trunkOpened = true;
      Audio.playChime(220);
    }
    if (action.key === 'tv' && S.loop >= 2) { Audio.playStatic(0.5); Glitch.trigger(2); }
    if (action.key === 'mirror' && S.loop >= 1) { Glitch.trigger(S.loop >= 2 ? 3 : 2); this.shiftSanity(-0.06); }
    if (action.key === 'yourWindow' && S.loop >= 1) { this.shiftSanity(-0.08); }
    if (action.key === 'atticWindow' && S.loop >= 1) { this.shiftSanity(-0.1); }
    if (action.key === 'journal' && S.loop >= 1) { this.shiftSanity(-0.1); setTimeout(() => Glitch.trigger(1), 2200); }
    if (action.key === 'approachDad' && S.loop >= 2) { setTimeout(() => this.triggerEnding(), 3500); }
    if (action.key === 'playMusicBox') {
      Audio.playMusicBox();
      S.flags.musicBoxPlayed = true;
      setTimeout(() => this.triggerEnding(), 7000);
    }

    UI.updateSanity(S.sanity);
  },

  examineItem(item) {
    const info = {
      'basement key': `A brass key on a paper tag labeled *B*. It's warm to the touch.`,
      'music box': `A wooden box, painted with faded flowers. The mechanism still works. On the bottom, in your mother's handwriting: *For Ellie. Sweet dreams.*`
    };
    UI.print(info[item] || `You examine the ${item}.`);
  },

  shiftSanity(delta) {
    S.sanity = Math.max(0.05, Math.min(1, S.sanity + delta));
    UI.updateSanity(S.sanity);
    Glitch.startRandom(S.sanity);
    if (S.sanity < 0.35) Audio.startHeartbeat(95);
  },

  startClock() {
    S.clockTimer = setInterval(() => {
      S.clockM++;
      if (S.clockM >= 60) { S.clockM = 0; S.clockH++; }
      if (S.clockH >= 24) S.clockH = 0;
      if (S.clockH === 0 && S.clockM === 0) this.triggerLoop();
      UI.setClock(S.clockH, S.clockM, S.sanity);
    }, 10000); // 10 real seconds = 1 game minute
  },

  triggerLoop() {
    S.loop++;
    if (S.loop >= 5 && !S.flags.ending) { this.triggerEnding(); return; }

    UI.updateLoop(S.loop);
    Glitch.trigger(3);
    Audio.playStatic(0.9);

    UI.fadeOut(() => {
      UI.clear();
      UI.print('*The clock strikes midnight.*', 'system');
      UI.print('*You wake up in the driveway.*', 'horror');
      S.clockH = 23;
      S.clockM = 47;
      S.seenRooms.clear();
      S.sanity = Math.max(0.1, S.sanity - 0.12);
      setTimeout(() => this.enterRoom('driveway'), 1800);
    }, 900);
  },

  triggerEnding() {
    if (S.flags.ending) return;
    S.flags.ending = true;
    clearInterval(S.clockTimer);
    Audio.stopHeartbeat();

    const trueEnd = S.flags.musicBoxPlayed;
    const goodEnd = S.flags.trunkOpened && S.loop >= 2;
    const loopEnd = S.loop >= 3;

    let title, text;

    if (trueEnd) {
      title = 'LET GO';
      text = `Your father takes your hand.

His hand is warm. You had forgotten what warm felt like.

"Your mother has been asking about you," he says. He smiles — the real smile, without the weight behind it. The one you had been trying to remember for twenty years.

The attic window fills with something that has no name — early morning or late evening or all the summers you missed compressed into one soft light. The marigolds in the garden below sway, though there is no wind.

You leave through the window.

This time, you do not fall.

—

The house stood empty for six months before the trust sold it. The new owners reported that on warm summer nights, you could smell marigolds in rooms where no flowers grew.

They thought it was charming.

They were right.`;
    } else if (goodEnd) {
      title = 'HOLLOW';
      text = `Your father opens his eyes and you understand everything, all at once.

You are eight years old and you are also everything after eight. You are the lamp that won't go off. You are the handprints on the kitchen window and the warmth in the mug and the marigolds growing from stone.

"I'm here," your father says. "I came to find you."

You reach for his hand. It takes three tries — you have been only barely here for so long.

The fourth time, you hold on.

—

The house was sold the following spring. The new family planted marigolds in the garden, though neither of them could explain why they'd chosen them.`;
    } else if (loopEnd) {
      title = 'AGAIN';
      text = `You don't take his hand.

You stand at the attic window and look down at the garden and think: *not yet. just one more night. just one more look.*

The clock strikes midnight.

You wake up in the driveway.

The house is dark save for a light in your old bedroom window.

—

You have been here before.

You have been here forever.`;
    } else {
      title = 'HOLLOW';
      text = `Your father opens his eyes.

And you understand what you are.

—

The clock strikes midnight.

You wake up in the driveway.

The house is waiting.`;
    }

    setTimeout(() => {
      UI.fadeOut(() => setTimeout(() => UI.showEnding(title, text), 600), 2000);
    }, 1500);
  },
};


// ─── START ───────────────────────────────────────────────────────
document.getElementById('title-screen').addEventListener('click', () => {
  const ts = document.getElementById('title-screen');
  ts.style.transition = 'opacity 2s ease';
  ts.style.opacity = '0';
  ts.style.pointerEvents = 'none';
  Audio.init();
  setTimeout(() => Audio.playStatic(0.4), 400);
  setTimeout(() => Audio.playChime(110, 0.2), 900);
  setTimeout(() => {
    ts.style.display = 'none';
    Game.init();
  }, 2100);
});
</script>
